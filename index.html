<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ペナルティキックマスター</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Arial Black', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
        }

        .container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        video { display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); position: absolute; top: 0; left: 0; z-index: 5; }
        
        /* ゲーム画面用画像 */
        #game-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 10;
            display: none;
        }

        .ui-header {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 50;
            pointer-events: none;
        }

        .info-box {
            background: rgba(0,0,0,0.7);
            padding: 8px 25px;
            border-radius: 15px;
            font-size: clamp(24px, 4vh, 50px); 
            border: 3px solid;
            font-weight: 900;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            min-width: 220px;
            text-align: center;
        }
        #score-display { color: #00ffcc; border-color: #00ffcc; }
        #shot-display { color: #ff9900; border-color: #ff9900; }

        /* 文字表示コンテナ（画面上部） */
        #command-container {
            position: absolute;
            top: 14vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 40;
        }

        #command-text {
            font-size: 14vh; 
            font-weight: 900;
            color: #00ff00;
            text-align: center;
            line-height: 1.0;
            white-space: nowrap;
            letter-spacing: -0.04em;
            text-shadow: 
                8px 8px 0px #000, 
                -8px -8px 0px #000, 
                8px -8px 0px #000, 
                -8px 8px 0px #000,
                0 0 60px rgba(0,255,0,0.6);
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
        }
        .overlay.preview-mode { background: rgba(0,0,0,0.3); }

        .btn-start {
            padding: 25px 60px;
            font-size: 30px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
            pointer-events: auto;
        }

        #status-msg {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,255,0,0.85); color: #000; padding: 12px 30px;
            border-radius: 40px; font-size: 30px; font-weight: bold; z-index: 60; display: none;
        }

        #alert-msg {
            position: absolute; 
            bottom: 70px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.85); 
            color: #fff; 
            padding: 12px 35px;
            border-radius: 40px; 
            font-size: 24px; 
            font-weight: bold; 
            z-index: 65; 
            display: none; 
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            pointer-events: none;
        }

        .text-shadow-bg {
            background: rgba(0,0,0,0);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
        }

        .highlight { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <img id="game-image" src="0.png" alt="Game Screen">
        <div id="status-msg">しせいをセットしました</div>
        
        <div id="alert-msg">⚠ 鼻から足首までをカメラに映してください</div>

        <div class="ui-header">
            <div id="score-display" class="info-box">SCORE: <span id="val-score">0</span></div>
            <div id="shot-display" class="info-box">KICK: <span id="val-shot">0</span>/10</div>
        </div>

        <div id="command-container">
            <div id="command-text"></div>
        </div>

        <div id="start-screen" class="overlay">
            <div class="text-shadow-bg">
                <h1 style="font-size: 60px; margin-bottom: 20px;">ペナルティキックマスター</h1>
                <button class="btn-start" onclick="initApp()">カメラを起動する</button>
                <div id="setup-guide" style="margin-top:30px; font-size: 22px; line-height: 1.6;">
                    全身が映る位置に立ってください。<br>
                    <span class="highlight">「手をあげて」→「さげる」</span> で開始！
                </div>
            </div>
        </div>

        <div id="result-screen" class="overlay" style="display: none;">
            <div class="text-shadow-bg">
                <h1 id="result-title" style="font-size: 10vh; color: #ffcc00; margin-bottom: 10px;">GAME OVER</h1>
                <div style="font-size: 8vh; margin-bottom: 30px;">SCORE: <span id="final-score" style="color:#00ff00;">0</span></div>
                <div>
                    <span class="highlight" style="font-size: 32px;">もういちど？</span><br>
                    <span style="font-size: 24px;">手をあげて戻すとスタート</span>
                </div>
            </div>
        </div>
    </div>

    <div style="display: none;">
        <img src="0.png"><img src="1.png"><img src="2.png"><img src="3.png"><img src="4.png">
        <img src="5.png"><img src="6.png"><img src="7.png"><img src="8.png"><img src="9.png">
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameImage = document.getElementById('game-image');
        const alertElement = document.getElementById('alert-msg');
        
        let score = 0;
        let shotCount = 0;
        let gameActive = false;
        let waitingForNeutral = false; 
        let isWaitingForReturn = false; 
        let isProcessingSuccess = false; 
        let appInitialized = false;
        let lastEndTime = 0;

        const START_COOLDOWN = 3000;  
        const EXIT_HOLD_TIME = 4000;   
        const LEG_THRESHOLD_RATIO = 0.82; 
        
        // --- 判定用しきい値 ---
        const KNEE_LIFT_THRESHOLD = 0.07; 
        const ANKLE_LIFT_THRESHOLD = 0.10; 
        const KNEE_STAY_THRESHOLD = 0.05; 
        const SIDE_STEP_THRESHOLD = 0.12; 
        const MAX_ANKLE_LATERAL_LIMIT = 0.08; 
        const INNER_KICK_THRESHOLD = 0.02; 

        let initialHipAnkleDistL = 0;
        let initialHipAnkleDistR = 0;
        let initialKneeY_L = 0;
        let initialKneeY_R = 0;
        let initialAnkleY_L = 0;
        let initialAnkleY_R = 0;

        let handsUpStartTime = null; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;

        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
        }

        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCheerSound(duration) {
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(800, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(1300, audioCtx.currentTime + 0.4); 
            filter.Q.setValueAtTime(1.2, audioCtx.currentTime);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.3); 
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration); 

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            noise.start();
            noise.stop(audioCtx.currentTime + duration);
        }

        // 【修正点】セーブ音を誇張・1.5倍以上に長くし、PCスピーカーでも聞こえる倍音仕様に変更
        function playCatchSound() {
            const duration = 0.40; // 長さを0.22秒から0.40秒（約1.8倍）に引き延ばし
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            // グローブに強く当たる「バシッ！！」という高音ノイズ成分
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.setValueAtTime(750, audioCtx.currentTime); // 聞こえやすい中音域寄りに微調整
            noiseFilter.Q.setValueAtTime(2.0, audioCtx.currentTime);

            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.8, audioCtx.currentTime); // 音量をアップ(0.6 -> 0.8)
            noiseGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);

            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);

            // ボールを体に収める「ドスッ」という衝撃音（ノートPCの弱点を克服するため三角波に変更）
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'triangle'; // サイン波から倍音が響く「三角波」に変更
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); // 周波数を高めにしてスピーカーを鳴らす
            osc.frequency.linearRampToValueAtTime(65, audioCtx.currentTime + 0.28); // 余韻を長めに
            
            oscGain.gain.setValueAtTime(0.9, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.32);

            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);

            noise.start();
            osc.start();
            noise.stop(audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text, lang = 'ja-JP') {
            synth.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = lang;
            
            const voices = synth.getVoices();
            let voice = null;
            
            if (lang.startsWith('ja')) {
                voice = voices.find(v => v.lang.startsWith('ja') && 
                    (v.name.includes('Ichiro') || v.name.includes('Otoya') || v.name.includes('Male') || v.name.includes('male')));
            } else if (lang.startsWith('en')) {
                voice = voices.find(v => v.lang.startsWith('en') && 
                    (v.name.includes('David') || v.name.includes('Mark') || v.name.includes('Male') || v.name.includes('male')));
            }
            
            if (voice) {
                uttr.voice = voice;
            } else {
                uttr.pitch = 0.75; 
            }

            if (lang.startsWith('ja')) {
                uttr.rate = 1.3; 
            } else {
                uttr.rate = 1.1; 
            }
            synth.speak(uttr);
        }

        function recordBasePosition(lm) {
            initialHipAnkleDistL = Math.abs(lm[27].y - lm[23].y);
            initialHipAnkleDistR = Math.abs(lm[28].y - lm[24].y);
            initialHipZ_L = lm[23].z;
            initialHipZ_R = lm[24].z;
            
            initialKneeY_L = lm[25].y;
            initialKneeY_R = lm[26].y;
            initialKneeZ_L = lm[25].z;
            initialKneeZ_R = lm[26].z;
            initialAnkleY_L = lm[27].y;
            initialAnkleY_R = lm[28].y;
            initialAnkleZ_L = lm[27].z;
            initialAnkleZ_R = lm[28].z;

            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);
        }

        function triggerRealStart(lm) {
            recordBasePosition(lm);
            waitingForNeutral = false;
            gameActive = true;
            isProcessingSuccess = false;
            isWaitingForReturn = false;
            score = 0;
            shotCount = 0;
            document.getElementById('val-score').innerText = score;
            document.getElementById('val-shot').innerText = shotCount;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            alertElement.style.display = 'none';

            gameImage.src = "0.png";
            gameImage.style.display = "block";

            playSound(880, 0.5);
            
            const cmdEl = document.getElementById('command-text');
            cmdEl.innerText = "キック！";
            cmdEl.style.fontSize = "14vh";
            cmdEl.style.color = "#00ffcc";

            speak("Come on!", "en-US");
        }

        function prepareStart() {
            if (gameActive || waitingForNeutral) return;
            waitingForNeutral = true;
            const cmdEl = document.getElementById('command-text');
            cmdEl.innerText = "手を下げてスタート";
            cmdEl.style.fontSize = "11vh";
            cmdEl.style.color = "#ff0";
            playSound(660, 0.2);
        }

        function endGame(isAborted = false) {
            gameActive = false;
            waitingForNeutral = false;
            lastEndTime = Date.now();
            
            gameImage.style.display = "none";
            const resScr = document.getElementById('result-screen');
            resScr.style.display = 'flex';
            resScr.classList.add('preview-mode');

            document.getElementById('final-score').innerText = score;
            document.getElementById('command-text').innerText = ""; 
            
            if (isAborted) {
                document.getElementById('result-title').innerText = "QUIT GAME";
                speak("ゲームを中断しました。");
            } else {
                document.getElementById('result-title').innerText = "GAME OVER";
                speak("ゲーム終了です。得点は、" + score + "点です。");
            }
        }

        function onResults(results) {
            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (!gameActive) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                if (results.poseLandmarks) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(0,255,200,0.5)', lineWidth: 2});
                }
            }

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const nose = lm[0], lWrist = lm[15], rWrist = lm[16];
                const lAnkle = lm[27], rAnkle = lm[28], lKnee = lm[25], rKnee = lm[26], lHip = lm[23], rHip = lm[24];

                const currentMidHipX = (lHip.x + rHip.x) / 2;

                const isBodyInFrame = 
                    (nose && nose.visibility > 0.55 && nose.x >= 0 && nose.x <= 1 && nose.y >= 0 && nose.y <= 1) &&
                    (lAnkle && lAnkle.visibility > 0.55 && lAnkle.x >= 0 && lAnkle.x <= 1 && lAnkle.y >= 0 && lAnkle.y <= 1) &&
                    (rAnkle && rAnkle.visibility > 0.55 && rAnkle.x >= 0 && rAnkle.x <= 1 && rAnkle.y >= 0 && rAnkle.y <= 1);

                if (!gameActive && !isBodyInFrame) {
                    alertElement.style.display = 'block';
                } else {
                    alertElement.style.display = 'none';
                }

                const lHandUp = lWrist.y < nose.y;
                const rHandUp = rWrist.y < nose.y;
                const currentDistL = Math.abs(lAnkle.y - lHip.y);
                const currentDistR = Math.abs(rAnkle.y - rHip.y);

                if (!gameActive && !waitingForNeutral && (lHandUp || rHandUp)) {
                    if (Date.now() - lastEndTime > START_COOLDOWN && isBodyInFrame) {
                        prepareStart();
                    }
                }
                if (waitingForNeutral && !lHandUp && !rHandUp) {
                    if (isBodyInFrame) {
                        triggerRealStart(lm);
                    } else {
                        waitingForNeutral = false;
                        document.getElementById('command-text').innerText = "";
                    }
                }

                if (gameActive && (lHandUp || rHandUp)) {
                    if (handsUpStartTime === null) handsUpStartTime = Date.now();
                    else if (Date.now() - handsUpStartTime >= EXIT_HOLD_TIME) {
                        endGame(true);
                        handsUpStartTime = null;
                        return;
                    }
                } else { handsUpStartTime = null; }

                if (gameActive) {
                    const cmdEl = document.getElementById('command-text');
                    const isLFootBent = initialHipAnkleDistL > 0 && currentDistL < (initialHipAnkleDistL * LEG_THRESHOLD_RATIO);
                    const isRFootBent = initialHipAnkleDistR > 0 && currentDistR < (initialHipAnkleDistR * LEG_THRESHOLD_RATIO);
                    
                    const isLKneeLifted = lKnee.y < (initialKneeY_L - KNEE_LIFT_THRESHOLD);
                    const isRKneeLifted = rKnee.y < (initialKneeY_R - KNEE_LIFT_THRESHOLD);
                    const isLKneeStatic = Math.abs(lKnee.y - initialKneeY_L) < KNEE_STAY_THRESHOLD;
                    const isRKneeStatic = Math.abs(rKnee.y - initialKneeY_R) < KNEE_STAY_THRESHOLD;

                    const isLAnkleLifted = lAnkle.y < (initialAnkleY_L - ANKLE_LIFT_THRESHOLD);
                    const isRAnkleLifted = rAnkle.y < (initialAnkleY_R - ANKLE_LIFT_THRESHOLD);

                    if (isWaitingForReturn) {
                        if (!isLFootBent && !isRFootBent && isLKneeStatic && isRKneeStatic) {
                            isWaitingForReturn = false;
                            cmdEl.innerText = "キック！";
                            cmdEl.style.fontSize = "14vh";
                            cmdEl.style.color = "#00ffcc";
                            
                            speak("Come on!", "en-US");
                        }
                    } 
                    else if (!isProcessingSuccess) {
                        let kickDirection = null; 
                        const lAnkleOffset = lAnkle.x - currentMidHipX; 
                        const rAnkleOffset = currentMidHipX - rAnkle.x;

                        // 1. ひだりうち（右方向へ）
                        if (isLFootBent && lAnkleOffset < INNER_KICK_THRESHOLD && !isRFootBent) {
                            kickDirection = 'right';
                        }
                        // 2. みぎうち（左方向へ）
                        else if (isRFootBent && rAnkleOffset < INNER_KICK_THRESHOLD && !isLFootBent) {
                            kickDirection = 'left';
                        }
                        // 3. ひだりそと（左方向へ）
                        else if (isLFootBent && lAnkleOffset > SIDE_STEP_THRESHOLD && !isRFootBent) {
                            kickDirection = 'left';
                        }
                        // 4. みぎそと（右方向へ）
                        else if (isRFootBent && rAnkleOffset > SIDE_STEP_THRESHOLD && !isLFootBent) {
                            kickDirection = 'right';
                        }
                        // 5. ひだりまえ（正面）
                        else if (lKnee.z > lAnkle.z && isLFootBent && isLKneeLifted && isLAnkleLifted && lAnkleOffset < MAX_ANKLE_LATERAL_LIMIT && !isRFootBent) {
                            kickDirection = 'center';
                        }
                        // 6. みぎまえ（正面）
                        else if (rKnee.z > rAnkle.z && isRFootBent && isRKneeLifted && isRAnkleLifted && rAnkleOffset < MAX_ANKLE_LATERAL_LIMIT && !isLFootBent) {
                            kickDirection = 'center';
                        }

                        if (kickDirection !== null) {
                            isProcessingSuccess = true; 
                            shotCount++;
                            document.getElementById('val-shot').innerText = shotCount;

                            playSound(160, 0.2);

                            const kpDirections = ['left', 'center', 'right'];
                            const keeperDirection = kpDirections[Math.floor(Math.random() * kpDirections.length)];

                            let imgNum = 1;
                            let isGoal = false;

                            if (keeperDirection === 'center') {
                                if (kickDirection === 'center') { imgNum = 1; isGoal = false; }
                                else if (kickDirection === 'left')   { imgNum = 2; isGoal = true; }
                                else if (kickDirection === 'right')  { imgNum = 3; isGoal = true; }
                            } else if (keeperDirection === 'left') {
                                if (kickDirection === 'left')   { imgNum = 4; isGoal = false; }
                                else if (kickDirection === 'center') { imgNum = 5; isGoal = true; }
                                else if (kickDirection === 'right')  { imgNum = 6; isGoal = true; }
                            } else if (keeperDirection === 'right') {
                                if (kickDirection === 'right')  { imgNum = 7; isGoal = false; }
                                else if (kickDirection === 'center') { imgNum = 8; isGoal = true; }
                                else if (kickDirection === 'left')   { imgNum = 9; isGoal = true; }
                            }

                            if (isGoal) {
                                score++;
                                document.getElementById('val-score').innerText = score;
                                cmdEl.innerText = "ゴール！";
                                cmdEl.style.color = "#00ff00"; 
                                speak("ゴール");
                                playCheerSound(6.0);
                            } else {
                                cmdEl.innerText = "セーブ！";
                                cmdEl.style.color = "#ff3366"; 
                                
                                // 【修正反映】聞き取りやすく誇張されたキャッチ音を再生
                                playCatchSound();
                            }

                            gameImage.src = imgNum + ".png";

                            setTimeout(() => {
                                if (shotCount >= 10) {
                                    endGame(false);
                                } else {
                                    gameImage.src = "0.png";
                                    isProcessingSuccess = false;
                                    isWaitingForReturn = true;
                                    cmdEl.innerText = "もどして";
                                    cmdEl.style.fontSize = "12vh";
                                    cmdEl.style.color = "#ffff00";
                                }
                            }, 5000);
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        function initApp() {
            if (appInitialized) return;
            audioCtx.resume();
            appInitialized = true;
            document.querySelector('.btn-start').style.display = 'none';
            camera.start().then(() => {
                document.getElementById('start-screen').classList.add('preview-mode');
            });
        }
    </script>
</body>
</html>
